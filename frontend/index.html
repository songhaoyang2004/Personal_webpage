<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="昊洋 — 个人主页、简历与项目" />
  <title>昊洋 | 个人主页</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <a class="skip-link" id="i18n-skip" href="#main">跳到主要内容</a>
  <header class="site-header">
    <div class="header-inner">
      <span class="logo" id="nav-name">加载中…</span>
      <div class="lang-switch" role="group" aria-label="语言切换">
        <button type="button" class="lang-btn" data-lang="zh" aria-pressed="true">中文</button>
        <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
      </div>
      <nav class="nav" id="i18n-nav" aria-label="页面导航">
        <a href="#about" id="nav-about">关于</a>
        <a href="#education" id="nav-education">教育</a>
        <a href="#experience" id="nav-experience">实习</a>
        <a href="#projects" id="nav-projects">项目</a>
        <a href="#publications" id="nav-publications">论文</a>
        <a href="#campus" id="nav-campus">校园</a>
        <a href="#skills" id="nav-skills">技能</a>
        <a href="#contact" id="nav-contact">联系</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="hero" id="about" aria-labelledby="hero-title">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-inner">
        <div class="hero-content">
          <p class="hero-kicker" id="i18n-hero-kicker">你好，我是</p>
          <h1 class="hero-title" id="hero-title">—</h1>
          <p class="hero-tagline" id="hero-tagline"></p>
          <p class="hero-meta" id="hero-meta-line">
            <span id="hero-location"></span>
          </p>
          <div class="hero-actions">
            <a class="btn btn-primary" id="i18n-btn-contact" href="#contact">联系我</a>
            <a class="btn btn-ghost" id="i18n-btn-projects" href="#projects">查看项目</a>
          </div>
        </div>
        <div class="hero-photo-wrap">
          <img
            id="hero-photo"
            class="hero-photo"
            src="/portrait.png"
            alt=""
            width="400"
            height="500"
            decoding="async"
            fetchpriority="high"
          />
        </div>
      </div>
    </section>

    <div class="container">
      <section id="education" class="section">
        <h2 class="section-title" id="st-education">教育背景</h2>
        <ul class="card-list" id="education-list"></ul>
      </section>

      <section id="experience" class="section">
        <h2 class="section-title" id="st-experience">实习经验</h2>
        <ul class="timeline" id="experience-list"></ul>
      </section>

      <section id="projects" class="section">
        <h2 class="section-title" id="st-projects">项目经历</h2>
        <ul class="project-grid" id="projects-list"></ul>
      </section>

      <section id="publications" class="section">
        <h2 class="section-title" id="st-publications">论文</h2>
        <ul class="publications-list" id="publications-list"></ul>
      </section>

      <section id="campus" class="section">
        <h2 class="section-title" id="st-campus">校园经历</h2>
        <ul class="timeline" id="campus-list"></ul>
      </section>

      <section id="skills" class="section">
        <h2 class="section-title" id="st-skills">技能与语言</h2>
        <p class="section-lead" id="language-block"></p>
        <h3 class="subsection-title" id="st-skills-sub">编程与技术</h3>
        <div class="skill-tags" id="skills-list"></div>
      </section>

      <section id="contact" class="section section-contact">
        <h2 class="section-title" id="st-contact">联系方式</h2>
        <div class="contact-cards" id="contact-cards"></div>
      </section>

    </div>
  </main>

  <button type="button" class="back-top" id="back-top" hidden aria-label="回到顶部">↑</button>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> <span id="footer-name">—</span></p>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
